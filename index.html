<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komutlar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Komutlar</h1>
    <div id="commands"></div>

    <script>
        fetch('kodlar1.json')
            .then(response => response.json())
            .then(data => {
                const commandsDiv = document.getElementById('commands');
                for (const [command, details] of Object.entries(data)) {
                    const commandDiv = document.createElement('div');
                    commandDiv.className = 'command';
                    
                    const title = document.createElement('h2');
                    title.textContent = command;
                    commandDiv.appendChild(title);
                    
                    const descDiv = document.createElement('div');
                    descDiv.className = 'desc-box';
                    descDiv.textContent = details.desc;
                    commandDiv.appendChild(descDiv);
                    
                    if (details.kullanım) {
                        const usageDiv = document.createElement('div');
                        usageDiv.className = 'usage-section';
                        const usageTitle = document.createElement('h3');
                        usageTitle.textContent = 'Kullanım:';
                        usageDiv.appendChild(usageTitle);

                        // Her bir kullanım parçası için düzenlenebilir input
                        const usageInputs = [];
                        details.kullanım.forEach(use => {
                            const input = document.createElement('input');
                            input.type = 'text';
                            input.value = use;
                            input.className = 'usage-input';
                            usageInputs.push(input);
                            usageDiv.appendChild(input);
                        });

                        // Birleştirilmiş kullanım satırı (yalnızca kopyalanabilir)
                        const combinedRow = document.createElement('div');
                        combinedRow.className = 'combined-usage';

                        const combinedInput = document.createElement('input');
                        combinedInput.type = 'text';
                        combinedInput.readOnly = true;
                        combinedInput.className = 'usage-input combined-input';
                        combinedRow.appendChild(combinedInput);

                        const copyButton = document.createElement('button');
                        copyButton.type = 'button';
                        copyButton.textContent = 'Kopyala';
                        copyButton.className = 'copy-button';
                        combinedRow.appendChild(copyButton);

                        const updateCombined = () => {
                            combinedInput.value = usageInputs.map(i => i.value.trim()).filter(Boolean).join(' ');
                        };

                        usageInputs.forEach(input => {
                            input.addEventListener('input', updateCombined);
                        });

                        updateCombined();

                        copyButton.addEventListener('click', () => {
                            const copyText = () => {
                                copyButton.textContent = 'Kopyalandı!';
                                setTimeout(() => {
                                    copyButton.textContent = 'Kopyala';
                                }, 1200);
                            };

                            const textToCopy = combinedInput.value;

                            if (navigator.clipboard && navigator.clipboard.writeText) {
                                navigator.clipboard.writeText(textToCopy).then(copyText).catch(() => {
                                    fallbackCopyText(textToCopy, copyText);
                                });
                            } else {
                                fallbackCopyText(textToCopy, copyText);
                            }
                        });

                        function fallbackCopyText(text, onSuccess) {
                            const textarea = document.createElement('textarea');
                            textarea.value = text;
                            textarea.style.position = 'fixed';
                            textarea.style.opacity = '0';
                            document.body.appendChild(textarea);
                            textarea.select();
                            try {
                                document.execCommand('copy');
                                onSuccess();
                            } catch {
                                alert('Kopyalama sırasında bir hata oluştu.');
                            }
                            document.body.removeChild(textarea);
                        }

                        usageDiv.appendChild(combinedRow);
                        commandDiv.appendChild(usageDiv);
                    }
                    
                    if (details.liste) {
                        const listTitle = document.createElement('h3');
                        listTitle.textContent = 'Liste:';
                        commandDiv.appendChild(listTitle);
                        
                        const listUl = document.createElement('ul');
                        for (const [key, val] of Object.entries(details.liste)) {
                            const li = document.createElement('li');
                            li.textContent = `${key}: ${val}`;
                            listUl.appendChild(li);
                        }
                        commandDiv.appendChild(listUl);
                    }
                    
                    commandsDiv.appendChild(commandDiv);
                }
            })
            .catch(error => console.error('JSON yüklenirken hata:', error));
    </script>
</body>
</html>
